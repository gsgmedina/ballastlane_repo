name: Deploy Blazor WASM to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel in-progress runs of the same group
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET (from global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Publish Blazor WASM
        run: dotnet publish src/TaskManager.Web/TaskManager.Web.csproj -c Release -o release

      - name: Rewrite base href for project-site subpath
        run: |
          sed -i 's|<base href="/" />|<base href="/ballastlane_repo/" />|g' release/wwwroot/index.html

      - name: Add SPA 404 fallback
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Disable Jekyll (keep _framework folder)
        run: touch release/wwwroot/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
