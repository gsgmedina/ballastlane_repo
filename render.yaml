# Render Blueprint — free, no credit card, no Azure.
# Hosts TaskManager.Api with the SQLite provider.
# NOTE: the free tier has no persistent disk, so the SQLite file resets on
# redeploy and after idle spin-down. DataSeeder repopulates demo data on start.
services:
  - type: web
    name: taskmanager-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /swagger
    envVars:
      # Use SQLite instead of the Cosmos default in appsettings.json
      - key: Database__Provider
        value: Sqlite
      # Allow the GitHub Pages frontend through CORS
      - key: Cors__AllowedOrigins__0
        value: https://gsgmedina.github.io
      # Show Swagger in the hosted environment for manual testing
      - key: ASPNETCORE_ENVIRONMENT
        value: Development
      # Secret — set the value in the Render dashboard, not in source
      - key: Jwt__SigningKey
        sync: false
